<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Web AR Furniture</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f0f0f0;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<body style="margin:0;">

<model-viewer
  id="model"
  src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  style="width:100vw; height:100vh;">
</model-viewer>

<button id="ar-button"
style="
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:20px;
z-index:10;">
ARで見る
</button>

<script>
document.getElementById('ar-button')
.addEventListener('click', async () => {

const modelViewer =
document.getElementById('model');

if (modelViewer.canActivateAR) {
  modelViewer.activateAR();
} else {
  alert("AR未対応です");
}

});
</script>

</body>

</html>
